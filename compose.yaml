name: local-workspace-rag

services:
  validate-env:
    image: python:3.11-slim
    working_dir: /app
    command: python scripts/validate_env.py
    volumes:
      - .:/app:ro

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_DB: ${POSTGRES_DB:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    depends_on:
      validate-env:
        condition: service_completed_successfully

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rag}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    depends_on:
      validate-env:
        condition: service_completed_successfully

  qdrant:
    image: qdrant/qdrant:v1.13.1
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    image: python:3.11-slim
    working_dir: /app
    command: >-
      sh -c "pip install --no-cache-dir . && uvicorn app.api.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      JWT_SECRET: ${JWT_SECRET:-}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      CHAT_MODEL: gemma3:4b
      EMBEDDING_MODEL: qwen3-embedding:0.6b
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      validate-env:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      minio:
        condition: service_started
      qdrant:
        condition: service_started
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - .:/app

  worker:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install --no-cache-dir . && python -m worker.main"
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      JWT_SECRET: ${JWT_SECRET:-}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      CHAT_MODEL: gemma3:4b
      EMBEDDING_MODEL: qwen3-embedding:0.6b
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      validate-env:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      minio:
        condition: service_started
      qdrant:
        condition: service_started
    volumes:
      - .:/app

  chainlit:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install --no-cache-dir . && chainlit run chainlit_app.py --host 0.0.0.0 --port 8001"
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      validate-env:
        condition: service_completed_successfully
      api:
        condition: service_started
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - .:/app

  langfuse-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${LANGFUSE_POSTGRES_USER:-langfuse}
      POSTGRES_DB: ${LANGFUSE_POSTGRES_DB:-langfuse}
      POSTGRES_PASSWORD: ${LANGFUSE_POSTGRES_PASSWORD:-}
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    depends_on:
      validate-env:
        condition: service_completed_successfully

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    volumes:
      - langfuse_data:/var/lib/clickhouse

  redis:
    image: redis:7-alpine
    volumes:
      - langfuse_redis_data:/data

  langfuse-web:
    image: langfuse/langfuse:3
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_POSTGRES_USER:-langfuse}:${LANGFUSE_POSTGRES_PASSWORD:-}@langfuse-postgres:5432/${LANGFUSE_POSTGRES_DB:-langfuse}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-}
      SALT: ${LANGFUSE_SALT:-}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-}
      NEXTAUTH_URL: http://localhost:3000
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      REDIS_CONNECTION_STRING: redis://redis:6379
      TELEMETRY_ENABLED: "false"
    depends_on:
      validate-env:
        condition: service_completed_successfully
      langfuse-postgres:
        condition: service_started
      clickhouse:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "127.0.0.1:3000:3000"

  langfuse-worker:
    image: langfuse/langfuse:3
    command: worker
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_POSTGRES_USER:-langfuse}:${LANGFUSE_POSTGRES_PASSWORD:-}@langfuse-postgres:5432/${LANGFUSE_POSTGRES_DB:-langfuse}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-}
      SALT: ${LANGFUSE_SALT:-}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-}
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      REDIS_CONNECTION_STRING: redis://redis:6379
      TELEMETRY_ENABLED: "false"
    depends_on:
      validate-env:
        condition: service_completed_successfully
      langfuse-postgres:
        condition: service_started
      clickhouse:
        condition: service_started
      redis:
        condition: service_started

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
  langfuse_postgres_data:
  langfuse_data:
  langfuse_redis_data:
