name: local-workspace-rag

services:
  validate-env:
    image: python:3.11-slim
    working_dir: /app
    command: python scripts/validate_env.py
    volumes:
      - .:/app:ro

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_DB: ${POSTGRES_DB:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    depends_on:
      validate-env:
        condition: service_completed_successfully

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rag}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-}
    volumes:
      - minio_data:/data
    depends_on:
      validate-env:
        condition: service_completed_successfully

  qdrant:
    image: qdrant/qdrant:v1.13.1
    volumes:
      - qdrant_data:/qdrant/storage
    depends_on:
      validate-env:
        condition: service_completed_successfully

  migrate:
    build:
      context: .
      dockerfile: worker/Dockerfile
    working_dir: /app
    command: alembic upgrade head
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      JWT_SECRET: ${JWT_SECRET:-}
    depends_on:
      validate-env:
        condition: service_completed_successfully
      postgres:
        condition: service_started
    volumes:
      - .:/app

  api:
    build:
      context: .
      dockerfile: worker/Dockerfile
    working_dir: /app
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      JWT_SECRET: ${JWT_SECRET:-}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-rag}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      CHAT_MODEL: gemma3:4b
      EMBEDDING_MODEL: qwen3-embedding:0.6b
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      validate-env:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      minio:
        condition: service_started
      qdrant:
        condition: service_started
    ports:
      - "127.0.0.1:8100:8000"
    volumes:
      - .:/app

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    working_dir: /app
    command: python -m worker.main
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      JWT_SECRET: ${JWT_SECRET:-}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-rag}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      CHAT_MODEL: gemma3:4b
      EMBEDDING_MODEL: qwen3-embedding:0.6b
      EMBEDDING_TOKENIZER: ${EMBEDDING_TOKENIZER:-local-byte}
      EMBEDDING_MAX_TOKENS: ${EMBEDDING_MAX_TOKENS:-32768}
      CHUNK_SIZE_TOKENS: ${CHUNK_SIZE_TOKENS:-400}
      CHUNK_OVERLAP_TOKENS: ${CHUNK_OVERLAP_TOKENS:-50}
      OCR_LANGUAGES: ${OCR_LANGUAGES:-eng+vie}
      OCR_DPI: ${OCR_DPI:-300}
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      validate-env:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      minio:
        condition: service_started
      qdrant:
        condition: service_started
    volumes:
      - .:/app

  chainlit:
    build:
      context: .
      dockerfile: worker/Dockerfile
    working_dir: /app
    command: chainlit run chainlit_app.py --host 0.0.0.0 --port 8001
    environment:
      API_BASE_URL: http://api:8000
      CHAINLIT_AUTH_SECRET: ${CHAINLIT_AUTH_SECRET:-}
      DATABASE_URL: ""
    depends_on:
      validate-env:
        condition: service_completed_successfully
      api:
        condition: service_started
    ports:
      - "127.0.0.1:8101:8001"
    volumes:
      - .:/app

  langfuse-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${LANGFUSE_POSTGRES_USER:-langfuse}
      POSTGRES_DB: ${LANGFUSE_POSTGRES_DB:-langfuse}
      POSTGRES_PASSWORD: ${LANGFUSE_POSTGRES_PASSWORD:-}
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    depends_on:
      validate-env:
        condition: service_completed_successfully

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: ${LANGFUSE_CLICKHOUSE_USER:-langfuse}
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - langfuse_data:/var/lib/clickhouse
      - ./config/clickhouse-listen.xml:/etc/clickhouse-server/config.d/listen.xml:ro
    depends_on:
      validate-env:
        condition: service_completed_successfully

  redis:
    image: redis:7-alpine
    volumes:
      - langfuse_redis_data:/data
    depends_on:
      validate-env:
        condition: service_completed_successfully

  langfuse-web:
    image: langfuse/langfuse:3
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_POSTGRES_USER:-langfuse}:${LANGFUSE_POSTGRES_PASSWORD:-}@langfuse-postgres:5432/${LANGFUSE_POSTGRES_DB:-langfuse}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-}
      SALT: ${LANGFUSE_SALT:-}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-}
      NEXTAUTH_URL: http://localhost:3100
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${LANGFUSE_CLICKHOUSE_USER:-langfuse}
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_CONNECTION_STRING: redis://redis:6379
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-rag}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-rag}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      TELEMETRY_ENABLED: "false"
    depends_on:
      validate-env:
        condition: service_completed_successfully
      langfuse-postgres:
        condition: service_started
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "127.0.0.1:3100:3000"

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_POSTGRES_USER:-langfuse}:${LANGFUSE_POSTGRES_PASSWORD:-}@langfuse-postgres:5432/${LANGFUSE_POSTGRES_DB:-langfuse}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-}
      SALT: ${LANGFUSE_SALT:-}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-}
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${LANGFUSE_CLICKHOUSE_USER:-langfuse}
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_AUTO_CLICKHOUSE_MIGRATION_DISABLED: "true"
      REDIS_CONNECTION_STRING: redis://redis:6379
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-rag}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-rag}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      TELEMETRY_ENABLED: "false"
    depends_on:
      validate-env:
        condition: service_completed_successfully
      langfuse-postgres:
        condition: service_started
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      langfuse-web:
        condition: service_started

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
  langfuse_postgres_data:
  langfuse_data:
  langfuse_redis_data:
